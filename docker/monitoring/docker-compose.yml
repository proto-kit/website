services:
  prometheus:
    image: prom/prometheus
    container_name: prometheus
    profiles:
      - monitoring
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--web.enable-remote-write-receiver'
      - '--enable-feature=native-histograms'
    networks:
      - monitoring
      - chain-net
    ports:
      - "9090:9090"
    restart: unless-stopped
    volumes:
      - ./prometheus/${PROTOKIT_ENV_FOLDER}:/etc/prometheus
      - ../data/prometheus:/prometheus

  loki:
    image: grafana/loki:latest
    container_name: loki
    profiles:
      - monitoring
    networks:
      - monitoring
    ports:
      - "3100:3100"
    command: -config.file=/etc/loki/local-config.yaml

  promtail:
    image: grafana/promtail:latest
    container_name: promtail
    profiles:
      - monitoring
    networks:
      - monitoring
    volumes:
      - ./promtail/promtail.yaml:/etc/promtail/docker-config.yaml
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - /var/run/docker.sock:/var/run/docker.sock
    command: -config.file=/etc/promtail/docker-config.yaml
    depends_on:
      - loki

  otel-collector:
    image: otel/opentelemetry-collector:0.86.0
    container_name: otel-collector
    profiles:
      - monitoring
    networks:
      - monitoring
      - chain-net
    command: [ "--config=/etc/otel-collector.yaml" ]
    volumes:
      - ./otel-collector/otel-collector.yaml:/etc/otel-collector.yaml
    ports:
      - "4318:4317"

  tempo:
    image: grafana/tempo:latest
    container_name: tempo
    networks:
      - monitoring
    profiles:
      - monitoring
    command: [ "-config.file=/etc/tempo.yaml" ]
    volumes:
      - ./tempo/tempo.yaml:/etc/tempo.yaml
      - ../data/tempo:/var/tempo
    ports:
      - "3200:3200" # tempo
      - "4317:4317" # otlp grpc

  grafana:
    image: grafana/grafana:11.0.1
    container_name: grafana
    profiles:
      - monitoring
    restart: unless-stopped
    networks:
      - monitoring
    ports:
      - "3001:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=${GF_SECURITY_ADMIN_USER}
      - GF_SECURITY_ADMIN_PASSWORD=${GF_SECURITY_ADMIN_PASSWORD}
      - GF_SECURITY_ALLOW_EMBEDDING=true
    volumes:
      - ./grafana:/etc/grafana/provisioning/datasources
      - ../data/grafana:/var/lib/grafana
    depends_on:
      - loki
      - tempo
      - prometheus
    labels:
      logging: "promtail"
      logging_jobname: "grafana"

networks:
  monitoring: